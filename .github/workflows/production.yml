name: Production

on:
  push:
    branches: ["main"]

env:
  PNPM_VERSION: 10.11.0
  TURBO_API: ${{ vars.TURBO_API }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
  CHROMATIC_APP_ID: ${{ vars.CHROMATIC_APP_ID }}
  API_URL: http://localhost:8080

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://postgres:password@localhost:5432/test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.85.0
          components: clippy, rustfmt
          cache-workspaces: apps/api

      - run: pnpm install

      - name: Install SQLX CLI
        run: |
          if ! command -v sqlx &> /dev/null; then
            cargo install sqlx-cli@0.7.4 --locked --no-default-features --features native-tls,postgres
          fi

      - name: SQLX check
        working-directory: apps/api
        run: |
          cargo sqlx database create && sqlx migrate run
          cargo sqlx prepare --check

      - run: pnpm build
      - run: pnpm check-types
      - run: pnpm lint
      - run: pnpm test

      - run: pnpm playwright install chromium
        working-directory: apps/web

      - run: pnpm test:e2e

      - name: Upload API binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-binary-${{ github.run_id }}
          path: |
            apps/api/target/release/api
            apps/api/.sqlx/
          retention-days: 1

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 30

  setup:
    runs-on: ubuntu-latest
    outputs:
      web_changed: ${{ steps.changed-files.outputs.web_any_changed }}
      admin_changed: ${{ steps.changed-files.outputs.admin_any_changed }}
      plugin_changed: ${{ steps.changed-files.outputs.plugin_any_changed }}
      storybook_changed: ${{ steps.changed-files.outputs.storybook_any_changed }}
      api_changed: ${{ steps.changed-files.outputs.api_any_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v45
        with:
          files_yaml: |
            web:
              - 'apps/web/**'
              - 'packages/**'
            admin:
              - 'apps/admin/**'
              - 'packages/**'
            plugin:
              - 'apps/plugin/**'
              - 'packages/**'
            storybook:
              - 'apps/storybook/**'
              - 'packages/**'
            api:
              - 'apps/api/**'

  deploy-web:
    needs: [ci, setup]
    if: needs.setup.outputs.web_changed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: Production - Web
      url: https://frameruniversity.com
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - run: pnpm install

      - run: pnpm build --filter=web

      - name: Deploy web to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: "apps/web"

  deploy-admin:
    needs: [ci, setup]
    if: needs.setup.outputs.admin_changed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: Production - Admin
      url: https://admin.frameruniversity.com
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - run: pnpm install

      - run: pnpm build --filter=admin

      - name: Deploy admin to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: "apps/admin"

  deploy-plugin:
    needs: [ci, setup]
    if: needs.setup.outputs.plugin_changed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: Production - Plugin
      url: https://plugin.frameruniversity.com
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - run: pnpm install

      - run: pnpm build --filter=plugin

      - name: Deploy plugin to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: "apps/plugin"

  deploy-storybook:
    needs: [ci, setup]
    if: needs.setup.outputs.storybook_changed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: Production - Storybook
      url: https://www.chromatic.com/library?appId=${{ vars.CHROMATIC_APP_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - run: pnpm install

      - run: pnpm build --filter=storybook

      - name: Deploy Storybook to Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: apps/storybook
          exitOnceUploaded: true
          autoAcceptChanges: "main"

  deploy-api:
    needs: [ci, setup]
    if: needs.setup.outputs.api_changed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: Production - API
      url: https://framer-university-api.fly.dev
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.85.0
          components: clippy, rustfmt
          cache-workspaces: apps/api

      - name: Download API binary artifact
        uses: actions/download-artifact@v4
        with:
          name: api-binary-${{ github.run_id }}
          path: apps/api/

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Deploy API to Fly
        run: flyctl deploy --dockerfile Dockerfile.prebuilt --build-arg BUILDKIT_INLINE_CACHE=1
        working-directory: apps/api
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
