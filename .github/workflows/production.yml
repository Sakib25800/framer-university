name: Production

on:
  push:
    branches: ["main"]

env:
  PNPM_VERSION: 10.11.0
  TURBO_API: ${{ vars.TURBO_API }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
  CHROMATIC_APP_ID: ${{ vars.CHROMATIC_APP_ID }}
  API_URL: http://localhost:8080

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://postgres:password@localhost:5432/test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Environment
        uses: ./.github/actions/setup-environment
        with:
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Run CI Pipeline
        uses: ./.github/actions/run-ci
        with:
          database-url: ${{ env.DATABASE_URL }}

  setup:
    runs-on: ubuntu-latest
    outputs:
      web_changed: ${{ steps.changed-files.outputs.web_any_changed }}
      admin_changed: ${{ steps.changed-files.outputs.admin_any_changed }}
      plugin_changed: ${{ steps.changed-files.outputs.plugin_any_changed }}
      storybook_changed: ${{ steps.changed-files.outputs.storybook_any_changed }}
      api_changed: ${{ steps.changed-files.outputs.api_any_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v45
        with:
          files_yaml: |
            web:
              - 'apps/web/**'
              - 'packages/**'
            admin:
              - 'apps/admin/**'
              - 'packages/**'
            plugin:
              - 'apps/plugin/**'
              - 'packages/**'
            storybook:
              - 'apps/storybook/**'
              - 'packages/**'
            api:
              - 'apps/api/**'

  deploy-web:
    needs: [ci, setup]
    if: needs.setup.outputs.web_changed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: Production - Web
      url: https://frameruniversity.com
    steps:
      - uses: actions/checkout@v4

      - name: Setup Environment
        uses: ./.github/actions/setup-environment
        with:
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Deploy web
        uses: ./.github/actions/deploy-web
        with:
          mode: production
          cloudflare-api-token: ${{ env.CLOUDFLARE_API_TOKEN }}
          cloudflare-account-id: ${{ env.CLOUDFLARE_ACCOUNT_ID }}

  deploy-admin:
    needs: [ci, setup]
    if: needs.setup.outputs.admin_changed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: Production - Admin
      url: https://admin.frameruniversity.com
    steps:
      - uses: actions/checkout@v4

      - name: Setup Environment
        uses: ./.github/actions/setup-environment
        with:
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Deploy admin
        uses: ./.github/actions/deploy-cloudflare-app
        with:
          app-name: admin
          mode: production
          cloudflare-api-token: ${{ env.CLOUDFLARE_API_TOKEN }}
          cloudflare-account-id: ${{ env.CLOUDFLARE_ACCOUNT_ID }}

  deploy-plugin:
    needs: [ci, setup]
    if: needs.setup.outputs.plugin_changed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: Production - Plugin
      url: https://plugin.frameruniversity.com
    steps:
      - uses: actions/checkout@v4

      - name: Setup Environment
        uses: ./.github/actions/setup-environment
        with:
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Deploy plugin
        uses: ./.github/actions/deploy-cloudflare-app
        with:
          app-name: plugin
          mode: production
          cloudflare-api-token: ${{ env.CLOUDFLARE_API_TOKEN }}
          cloudflare-account-id: ${{ env.CLOUDFLARE_ACCOUNT_ID }}

  deploy-storybook:
    needs: [ci, setup]
    if: needs.setup.outputs.storybook_changed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: Production - Storybook
      url: https://www.chromatic.com/library?appId=${{ vars.CHROMATIC_APP_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Environment
        uses: ./.github/actions/setup-environment
        with:
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Deploy Storybook
        uses: ./.github/actions/deploy-storybook
        with:
          mode: production
          chromatic-project-token: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          auto-accept-changes: "main"

  deploy-api:
    needs: [ci, setup]
    if: needs.setup.outputs.api_changed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: Production - API
      url: https://api.frameruniversity.com
    steps:
      - uses: actions/checkout@v4

      - name: Setup Environment
        uses: ./.github/actions/setup-environment
        with:
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Deploy API
        uses: ./.github/actions/deploy-api
        with:
          mode: production
          database-url: ${{ secrets.DATABASE_URL }}
          jwt-secret: ${{ secrets.JWT_SECRET }}
          mailgun-smtp-password: ${{ secrets.MAILGUN_SMTP_PASSWORD }}
          fly-api-token: ${{ env.FLY_API_TOKEN }}
          fly-org: ${{ env.FLY_ORG }}