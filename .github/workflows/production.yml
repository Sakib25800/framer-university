  deploy:
    # needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - run: pnpm install
      - run: pnpm build

      - name: Debug web app before deployment
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== Directory contents ==="
          ls -la
          echo "=== .open-next contents ==="
          ls -la .open-next/ || echo ".open-next directory not found"
          echo "=== Checking for worker.js ==="
          find . -name "worker.js" -type f
          echo "=== wrangler.toml contents ==="
          cat wrangler.toml || echo "No wrangler.toml found"
        working-directory: "apps/web"

      - name: Deploy web to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: "apps/web"

      - name: Deploy admin to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: "apps/admin"

      - name: Deploy plugin to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: "apps/plugin"

      - name: Deploy Storybook to Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: apps/storybook
          exitOnceUploaded: true

      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy API to Fly
        run: flyctl deploy
        working-directory: apps/api
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
