name: Preview

# Test cache performance after optimizations
on:
  pull_request:
    types: [opened, synchronize]

env:
  PNPM_VERSION: 10.11.0
  TURBO_API: ${{ vars.TURBO_API }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
  NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
  CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
  CHROMATIC_APP_ID: ${{ vars.CHROMATIC_APP_ID }}
  FLY_ORG: ${{ vars.FLY_ORG }}
  API_URL: http://localhost:8080

jobs:
  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete Neon Branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch: preview/pr-${{ github.event.number }}
          api_key: ${{ env.NEON_API_KEY }}
        continue-on-error: true

      - name: Delete Fly Apps
        uses: superfly/fly-pr-review-apps@1.2.0
        if: github.event.action == 'closed'
        with:
          token: ${{ env.FLY_API_TOKEN }}
          environment: preview
        continue-on-error: true

  ci:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://postgres:password@localhost:5432/test
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    environment:
      name: preview
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.85.0
          components: clippy, rustfmt
          cache-workspaces: apps/api

      - name: Get branch name
        id: branch-name
        uses: tj-actions/branch-names@v8

      - name: Create Neon Branch
        id: create-branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ steps.branch-name.outputs.current_branch }}
          role: neondb_owner
          api_key: ${{ env.NEON_API_KEY }}

      - run: pnpm install

      - name: Install SQLX CLI
        run: |
          if ! command -v sqlx &> /dev/null; then
            cargo install sqlx-cli@0.7.4 --locked --no-default-features --features native-tls,postgres
          fi

      - name: SQLX setup
        working-directory: apps/api
        env:
          DATABASE_URL: ${{ steps.create-branch.outputs.db_url }}
        run: |
          echo "Database URL: ${DATABASE_URL}"
          cargo sqlx database create && sqlx migrate run
          pnpm generate-sqlx

      - run: pnpm build
      - run: pnpm check-types
      - run: pnpm lint
      - run: pnpm test

      - run: pnpm playwright install chromium
        working-directory: apps/web

      - run: pnpm test:e2e
        env:
          DATABASE_URL: ${{ steps.create-branch.outputs.db_url }}

      - name: Upload API binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-binary-${{ github.run_id }}
          path: |
            apps/api/target/release/api
            apps/api/.sqlx/
          retention-days: 1

  setup:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      branch-id: ${{ steps.create-branch.outputs.branch_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Neon Branch
        id: create-branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.number }}
          role: neondb_owner
          api_key: ${{ env.NEON_API_KEY }}

  deploy-web:
    needs: [ci, setup]
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    environment:
      name: Preview - Web
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
      status: ${{ steps.deploy.outputs.status }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - run: pnpm install
      - run: pnpm build --filter=web

      - name: Deploy web to Cloudflare
        id: deploy
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          workingDirectory: "apps/web"
          command: deploy

  deploy-admin:
    needs: [ci, setup]
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    environment:
      name: Preview - Admin
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
      status: ${{ steps.deploy.outputs.status }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - run: pnpm install
      - run: pnpm build --filter=admin

      - name: Deploy admin to Cloudflare
        id: deploy
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          workingDirectory: "apps/admin"
          command: deploy

  deploy-plugin:
    needs: [ci, setup]
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    environment:
      name: Preview - Plugin
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
      status: ${{ steps.deploy.outputs.status }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - run: pnpm install
      - run: pnpm build --filter=plugin

      - name: Deploy plugin to Cloudflare
        id: deploy
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          workingDirectory: "apps/plugin"
          command: deploy

  deploy-storybook:
    needs: [ci, setup]
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.deploy.outputs.status }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - run: pnpm install
      - run: pnpm build --filter=storybook

      - name: Deploy Storybook to Chromatic
        id: deploy
        uses: chromaui/action@latest
        continue-on-error: true
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: apps/storybook

  deploy-api:
    needs: [ci, setup]
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    environment:
      name: Preview - API
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
      status: ${{ steps.deploy.outputs.status }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.85.0
          components: clippy, rustfmt
          cache-workspaces: apps/api

      - run: pnpm install

      - name: Download API binary artifact
        uses: actions/download-artifact@v4
        with:
          name: api-binary-${{ github.run_id }}
          path: apps/api/

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy API to Fly
        id: deploy
        uses: superfly/fly-pr-review-apps@1.2.0
        continue-on-error: true
        with:
          name: framer-university-api-pr-${{ github.event.number }}
          secrets: DATABASE_URL=${{ steps.create-branch.outputs.db_url }}
          postgres: false
          path: apps/api
          region: bos
          org: ${{ env.FLY_ORG }}
          config: fly.toml

  comment:
    needs: [deploy-web, deploy-admin, deploy-plugin, deploy-storybook, deploy-api, setup]
    if: always() && github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Get PR number
        id: pr-number
        run: echo "number=${{ github.event.number }}" >> $GITHUB_OUTPUT

      - name: Create comment body
        id: comment-body
        run: |
          # Determine deployment statuses and emojis
          web_status="${{ needs.deploy-web.result }}"
          admin_status="${{ needs.deploy-admin.result }}"
          plugin_status="${{ needs.deploy-plugin.result }}"
          api_status="${{ needs.deploy-api.result }}"
          storybook_status="${{ needs.deploy-storybook.result }}"
          
          # Function to get emoji based on status
          get_emoji() {
            case $1 in
              success) echo "✅" ;;
              failure) echo "❌" ;;
              cancelled) echo "❌" ;;
              skipped) echo "⏭️" ;;
              *) echo "🔄" ;;
            esac
          }
          
          # Get URLs
          web_url="${{ needs.deploy-web.outputs.url }}"
          admin_url="${{ needs.deploy-admin.outputs.url }}"
          plugin_url="${{ needs.deploy-plugin.outputs.url }}"
          api_url="${{ needs.deploy-api.outputs.url }}"
          
          # Create inspect links for Cloudflare
          web_inspect=""
          admin_inspect=""
          plugin_inspect=""
          api_inspect=""
          
          if [[ "$web_status" == "success" && -n "$web_url" ]]; then
            web_inspect=" ([Inspect](https://dash.cloudflare.com/${{ env.CLOUDFLARE_ACCOUNT_ID }}/workers/services/view/web/production/logs/live))"
          fi
          
          if [[ "$admin_status" == "success" && -n "$admin_url" ]]; then
            admin_inspect=" ([Inspect](https://dash.cloudflare.com/${{ env.CLOUDFLARE_ACCOUNT_ID }}/workers/services/view/admin/production/logs/live))"
          fi
          
          if [[ "$plugin_status" == "success" && -n "$plugin_url" ]]; then
            plugin_inspect=" ([Inspect](https://dash.cloudflare.com/${{ env.CLOUDFLARE_ACCOUNT_ID }}/workers/services/view/plugin/production/logs/live))"
          fi
          
          if [[ "$api_status" == "success" && -n "$api_url" ]]; then
            api_inspect=" ([Logs](https://fly.io/apps/framer-university-api-pr-${{ github.event.number }}/monitoring))"
          fi
          
          cat << EOF > comment.md
          ## ✅ Deploy Preview ready!
          
          |  | Name | Status | Preview | Updated |
          |--|------|--------|---------|---------|
          | $(get_emoji $web_status) | **web** | $web_status | ${web_url:-"—"} | $(date -u +'%b %d, %Y %H:%M UTC') |
          | $(get_emoji $admin_status) | **admin** | $admin_status | ${admin_url:-"—"} | $(date -u +'%b %d, %Y %H:%M UTC') |
          | $(get_emoji $plugin_status) | **plugin** | $plugin_status | ${plugin_url:-"—"} | $(date -u +'%b %d, %Y %H:%M UTC') |
          | $(get_emoji $api_status) | **api** | $api_status | ${api_url:-"—"} | $(date -u +'%b %d, %Y %H:%M UTC') |
          | $(get_emoji $storybook_status) | **storybook** | $storybook_status | [chromatic.com](https://www.chromatic.com/builds?appId=${{ env.CHROMATIC_APP_ID }}) | $(date -u +'%b %d, %Y %H:%M UTC') |
          
          ${web_inspect}${admin_inspect}${plugin_inspect}${api_inspect}
          
          **Database**: \`preview/pr-${{ github.event.number }}\` (Branch ID: \`${{ needs.setup.outputs.branch-id }}\`)
          
          <sub>Built with commit ${{ github.sha }}.</sub>
          EOF

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const commentBody = fs.readFileSync('comment.md', 'utf8');

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.find(comment => 
              comment.body.includes('Deploy Preview ready!')
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            }