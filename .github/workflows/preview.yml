name: Preview

# Test cache performance after optimizations
on:
  pull_request:
    types: [opened, synchronize]

env:
  PNPM_VERSION: 10.11.0
  TURBO_API: ${{ vars.TURBO_API }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
  NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
  CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
  CHROMATIC_APP_ID: ${{ vars.CHROMATIC_APP_ID }}
  FLY_ORG: ${{ vars.FLY_ORG }}
  API_URL: http://localhost:8080

jobs:
  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete Neon Branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch: preview/pr-${{ github.event.number }}
          api_key: ${{ env.NEON_API_KEY }}
        continue-on-error: true

      - name: Delete Fly Apps
        uses: superfly/fly-pr-review-apps@1.2.0
        if: github.event.action == 'closed'
        with:
          token: ${{ env.FLY_API_TOKEN }}
          environment: preview
        continue-on-error: true

  ci:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://postgres:password@localhost:5432/test
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    environment:
      name: preview
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.85.0
          components: clippy, rustfmt
          cache-workspaces: apps/api

      - name: Get branch name
        id: branch-name
        uses: tj-actions/branch-names@v8

      - name: Create Neon Branch
        id: create-branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ steps.branch-name.outputs.current_branch }}
          role: neondb_owner
          api_key: ${{ env.NEON_API_KEY }}

      - run: pnpm install

      - name: Install SQLX CLI
        run: |
          if ! command -v sqlx &> /dev/null; then
            cargo install sqlx-cli@0.7.4 --locked --no-default-features --features native-tls,postgres
          fi

      - name: SQLX setup
        working-directory: apps/api
        env:
          DATABASE_URL: ${{ steps.create-branch.outputs.db_url }}
        run: |
          echo "Database URL: ${DATABASE_URL}"
          cargo sqlx database create && sqlx migrate run
          pnpm generate-sqlx

      - run: pnpm build
      - run: pnpm check-types
      - run: pnpm lint
      - run: pnpm test

      - run: pnpm playwright install chromium
        working-directory: apps/web

      - run: pnpm test:e2e
        env:
          DATABASE_URL: ${{ steps.create-branch.outputs.db_url }}

      - name: Upload API binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-binary-${{ github.run_id }}
          path: |
            apps/api/target/release/api
            apps/api/.sqlx/
          retention-days: 1

  setup:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      branch-id: ${{ steps.create-branch.outputs.branch_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Neon Branch
        id: create-branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.number }}
          role: neondb_owner
          api_key: ${{ env.NEON_API_KEY }}

  deploy-web:
    needs: [ci, setup]
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    environment:
      name: Preview - Web
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
      status: ${{ job.status }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - run: pnpm install
      - run: pnpm build --filter=web

      - name: Deploy web to Cloudflare
        id: deploy
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          workingDirectory: "apps/web"
          command: deploy

  deploy-admin:
    needs: [ci, setup]
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    environment:
      name: Preview - Admin
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
      status: ${{ job.status }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - run: pnpm install
      - run: pnpm build --filter=admin

      - name: Deploy admin to Cloudflare
        id: deploy
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          workingDirectory: "apps/admin"
          command: deploy

  deploy-plugin:
    needs: [ci, setup]
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    environment:
      name: Preview - Plugin
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
      status: ${{ job.status }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - run: pnpm install
      - run: pnpm build --filter=plugin

      - name: Deploy plugin to Cloudflare
        id: deploy
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          workingDirectory: "apps/plugin"
          command: deploy

  deploy-storybook:
    needs: [ci, setup]
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      status: ${{ job.status }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - run: pnpm install
      - run: pnpm build --filter=storybook

      - name: Deploy Storybook to Chromatic
        id: deploy
        uses: chromaui/action@latest
        continue-on-error: true
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: apps/storybook

  deploy-api:
    needs: [ci, setup]
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    environment:
      name: Preview - API
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
      status: ${{ job.status }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.85.0
          components: clippy, rustfmt
          cache-workspaces: apps/api

      - run: pnpm install

      - name: Download API binary artifact
        uses: actions/download-artifact@v4
        with:
          name: api-binary-${{ github.run_id }}
          path: apps/api/

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Get branch name
        id: branch-name
        uses: tj-actions/branch-names@v8

      - name: Create Neon Branch
        id: create-branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ steps.branch-name.outputs.current_branch }}
          role: neondb_owner
          api_key: ${{ env.NEON_API_KEY }}

      - name: Deploy API to Fly
        id: deploy
        uses: superfly/fly-pr-review-apps@1.2.0
        with:
          name: framer-university-api-pr-${{ github.event.number }}
          secrets: DATABASE_URL=${{ steps.create-branch.outputs.db_url }}
          postgres: false
          path: apps/api
          org: ${{ env.FLY_ORG }}
          config: fly.toml

  comment:
    needs:
      [
        deploy-web,
        deploy-admin,
        deploy-plugin,
        deploy-storybook,
        deploy-api,
        setup
      ]
    if: always() && github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Get PR number
        id: pr-number
        run: echo "number=${{ github.event.number }}" >> $GITHUB_OUTPUT

      - name: Generate deployment status
        id: status
        run: |
          # Generate status for each deployment
          web_status="${{ needs.deploy-web.outputs.status }}"
          admin_status="${{ needs.deploy-admin.outputs.status }}"
          plugin_status="${{ needs.deploy-plugin.outputs.status }}"
          api_status="${{ needs.deploy-api.outputs.status }}"
          storybook_status="${{ needs.deploy-storybook.outputs.status }}"

          # Convert status to emoji and text
          get_status_display() {
            case "$1" in
              "success") echo "✅ Ready" ;;
              "failure") echo "❌ Failed" ;;
              "cancelled") echo "⚠️ Cancelled" ;;
              "skipped") echo "⏭️ Skipped" ;;
              *) echo "🔄 Building" ;;
            esac
          }

          # Generate preview links for successful deployments
          get_preview_link() {
            local status="$1"
            local url="$2"
            if [[ "$status" == "success" && -n "$url" ]]; then
              echo "[Visit Preview]($url)"
            else
              echo ""
            fi
          }

          # Generate inspect links
          get_inspect_link() {
            local name="$1"
            case "$name" in
              "web"|"admin"|"plugin") echo "([Inspect](https://dash.cloudflare.com/${{ env.CLOUDFLARE_ACCOUNT_ID }}/workers/services/view/$name/production/logs/live))" ;;
              "api") echo "([Inspect](https://fly.io/apps/framer-university-api-pr-${{ github.event.number }}/monitoring))" ;;
              "storybook") echo "([Inspect](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}))" ;;
              *) echo "" ;;
            esac
          }

          echo "web_display=$(get_status_display "$web_status") $(get_inspect_link "web")" >> $GITHUB_OUTPUT
          echo "admin_display=$(get_status_display "$admin_status") $(get_inspect_link "admin")" >> $GITHUB_OUTPUT
          echo "plugin_display=$(get_status_display "$plugin_status") $(get_inspect_link "plugin")" >> $GITHUB_OUTPUT
          echo "api_display=$(get_status_display "$api_status") $(get_inspect_link "api")" >> $GITHUB_OUTPUT
          echo "storybook_display=$(get_status_display "$storybook_status") $(get_inspect_link "storybook")" >> $GITHUB_OUTPUT

          echo "web_link=$(get_preview_link "$web_status" "${{ needs.deploy-web.outputs.url }}")" >> $GITHUB_OUTPUT
          echo "admin_link=$(get_preview_link "$admin_status" "${{ needs.deploy-admin.outputs.url }}")" >> $GITHUB_OUTPUT
          echo "plugin_link=$(get_preview_link "$plugin_status" "${{ needs.deploy-plugin.outputs.url }}")" >> $GITHUB_OUTPUT
          echo "api_link=$(get_preview_link "$api_status" "${{ needs.deploy-api.outputs.url }}")" >> $GITHUB_OUTPUT

      - name: Comment on Pull Request
        uses: thollander/actions-comment-pull-request@v2
        with:
          message: |
            The latest updates on your projects. ([Inspect](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}))

            | Name | Status | Preview | Updated (UTC) |
            |------|--------|---------|---------------|
            | **web** | ${{ steps.status.outputs.web_display }} | ${{ steps.status.outputs.web_link }} | ${{ github.event.head_commit.timestamp }} |
            | **admin** | ${{ steps.status.outputs.admin_display }} | ${{ steps.status.outputs.admin_link }} | ${{ github.event.head_commit.timestamp }} |
            | **plugin** | ${{ steps.status.outputs.plugin_display }} | ${{ steps.status.outputs.plugin_link }} | ${{ github.event.head_commit.timestamp }} |
            | **api** | ${{ steps.status.outputs.api_display }} | ${{ steps.status.outputs.api_link }} | ${{ github.event.head_commit.timestamp }} |
            | **storybook** | ${{ steps.status.outputs.storybook_display }} | [View on Chromatic](https://www.chromatic.com/builds?appId=${{ env.CHROMATIC_APP_ID }}) | ${{ github.event.head_commit.timestamp }} |
            | **database** | ✅ Ready | [preview/pr-${{ github.event.number }}](https://console.neon.tech/app/projects/${{ env.NEON_PROJECT_ID }}/branches/${{ needs.setup.outputs.branch-id }}) | ${{ github.event.head_commit.timestamp }} |
          comment_tag: preview-deployment
