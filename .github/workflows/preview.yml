name: Preview

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

env:
  PNPM_VERSION: 10.11.0
  TURBO_API: ${{ vars.TURBO_API }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
  NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}

jobs:
  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete Neon Branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch: preview/pr-${{ github.event.number }}
          api_key: ${{ env.NEON_API_KEY }}
        continue-on-error: true

      - name: Clean up GitHub environment
        uses: strumwolf/delete-deployment-environment@v2
        if: ${{ github.event.action == 'closed' }}
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          environment: pr-${{ github.event.number }}
        continue-on-error: true

  ci:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    concurrency:
      group: pr-${{ github.event.number }}
      cancel-in-progress: true
    environment:
      name: pr-${{ github.event.number }}
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.85.0
          components: clippy, rustfmt
          cache-workspaces: apps/api

      - name: Get branch name
        id: branch-name
        uses: tj-actions/branch-names@v8

      - name: Create Neon Branch
        id: create-branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.number }}
          role: neondb_owner
          api_key: ${{ env.NEON_API_KEY }}

      - run: pnpm install

      - name: SQLX setup
        working-directory: apps/api
        env:
          DATABASE_URL: ${{ steps.create-branch.outputs.db_url }}
        run: |
          cargo install sqlx-cli@0.7.4 --locked --no-default-features --features native-tls,postgres
          cargo sqlx database create && sqlx migrate run
          cargo sqlx prepare --check -- --all-targets

      - env:
          DATABASE_URL: ${{ steps.create-branch.outputs.db_url }}
        run: pnpm build

      - run: pnpm check-types
      - run: pnpm lint

      - env:
          DATABASE_URL: postgres://postgres:password@localhost:5432/test
        run: pnpm test

      - run: pnpm playwright install chromium
        working-directory: apps/web

      - env:
          DATABASE_URL: ${{ steps.create-branch.outputs.db_url }}
        run: pnpm test:e2e

  deploy:
    needs: ci
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    concurrency:
      group: pr-${{ github.event.number }}-deploy
      cancel-in-progress: true
    environment:
      name: pr-${{ github.event.number }}
      url: ${{ steps.deploy-web.outputs.deployment-url }}
    outputs:
      web-url: ${{ steps.deploy-web.outputs.deployment-url }}
      admin-url: ${{ steps.deploy-admin.outputs.deployment-url }}
      plugin-url: ${{ steps.deploy-plugin.outputs.deployment-url }}
      api-url: ${{ steps.deploy-api.outputs.url }}
      branch-id: ${{ steps.create-branch.outputs.branch_id }}
      web-status: ${{ steps.deploy-web.outcome }}
      admin-status: ${{ steps.deploy-admin.outcome }}
      plugin-status: ${{ steps.deploy-plugin.outcome }}
      api-status: ${{ steps.deploy-api.outcome }}
      database-status: ${{ steps.create-branch.outcome }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Create Neon Branch
        id: create-branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.number }}
          role: neondb_owner
          api_key: ${{ env.NEON_API_KEY }}

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.85.0
          components: clippy, rustfmt
          cache-workspaces: apps/api

      - run: pnpm install

      - name: SQLX setup
        working-directory: apps/api
        env:
          DATABASE_URL: ${{ steps.create-branch.outputs.db_url }}
        run: |
          cargo install sqlx-cli@0.7.4 --locked --no-default-features --features native-tls,postgres
          cargo sqlx database create && sqlx migrate run
          cargo sqlx prepare --check -- --all-targets

      - env:
          DATABASE_URL: ${{ steps.create-branch.outputs.db_url }}
        run: pnpm build

      - name: Deploy web to Cloudflare
        id: deploy-web
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: "apps/web"
          command: pages deploy --project-name=frameruniversity-web-preview --branch=pr-${{ github.event.number }}

      - name: Deploy admin to Cloudflare
        id: deploy-admin
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: "apps/admin"
          command: pages deploy --project-name=frameruniversity-admin-preview --branch=pr-${{ github.event.number }}

      - name: Deploy plugin to Cloudflare
        id: deploy-plugin
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: "apps/plugin"
          command: pages deploy --project-name=frameruniversity-plugin-preview --branch=pr-${{ github.event.number }}

      - name: Deploy API to Fly
        id: deploy-api
        uses: superfly/fly-pr-review-apps@1.5.0
        continue-on-error: true
        with:
          name: pr-${{ github.event.number }}-frameruniversity-api
          secrets: DATABASE_URL=${{ steps.create-branch.outputs.db_url }}
          postgres: false
          path: apps/api
          region: lhr
          org: personal

  schema-diff:
    needs: [ci, deploy]
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Schema Diff
        uses: neondatabase/schema-diff-action@v1
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          compare_branch: preview/pr-${{ github.event.number }}
          base_branch: main
          api_key: ${{ env.NEON_API_KEY }}
          database: neondb
          username: neondb_owner

  comment:
    needs: [deploy, schema-diff]
    if: always() && github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Get current timestamp
        id: timestamp
        run: echo "current=$(date -u +'%b %d, %Y %l:%M%p')" >> $GITHUB_OUTPUT

      - name: Set deployment statuses
        id: statuses
        run: |
          # Web status
          if [ "${{ needs.deploy.outputs.web-status }}" = "success" ]; then
            echo "web=✅ Ready" >> $GITHUB_OUTPUT
            echo "web-preview=[Visit Preview](${{ needs.deploy.outputs.web-url }})" >> $GITHUB_OUTPUT
          elif [ "${{ needs.deploy.outputs.web-status }}" = "failure" ]; then
            echo "web=❌ Failed" >> $GITHUB_OUTPUT
            echo "web-preview=" >> $GITHUB_OUTPUT
          else
            echo "web=🔄 Building" >> $GITHUB_OUTPUT
            echo "web-preview=" >> $GITHUB_OUTPUT
          fi
          
          # Admin status
          if [ "${{ needs.deploy.outputs.admin-status }}" = "success" ]; then
            echo "admin=✅ Ready" >> $GITHUB_OUTPUT
            echo "admin-preview=[Visit Preview](${{ needs.deploy.outputs.admin-url }})" >> $GITHUB_OUTPUT
          elif [ "${{ needs.deploy.outputs.admin-status }}" = "failure" ]; then
            echo "admin=❌ Failed" >> $GITHUB_OUTPUT
            echo "admin-preview=" >> $GITHUB_OUTPUT
          else
            echo "admin=🔄 Building" >> $GITHUB_OUTPUT
            echo "admin-preview=" >> $GITHUB_OUTPUT
          fi
          
          # Plugin status
          if [ "${{ needs.deploy.outputs.plugin-status }}" = "success" ]; then
            echo "plugin=✅ Ready" >> $GITHUB_OUTPUT
            echo "plugin-preview=[Visit Preview](${{ needs.deploy.outputs.plugin-url }})" >> $GITHUB_OUTPUT
          elif [ "${{ needs.deploy.outputs.plugin-status }}" = "failure" ]; then
            echo "plugin=❌ Failed" >> $GITHUB_OUTPUT
            echo "plugin-preview=" >> $GITHUB_OUTPUT
          else
            echo "plugin=🔄 Building" >> $GITHUB_OUTPUT
            echo "plugin-preview=" >> $GITHUB_OUTPUT
          fi
          
          # API status
          if [ "${{ needs.deploy.outputs.api-status }}" = "success" ]; then
            echo "api=✅ Ready" >> $GITHUB_OUTPUT
            echo "api-preview=[Visit Preview](${{ needs.deploy.outputs.api-url }})" >> $GITHUB_OUTPUT
          elif [ "${{ needs.deploy.outputs.api-status }}" = "failure" ]; then
            echo "api=❌ Failed" >> $GITHUB_OUTPUT
            echo "api-preview=" >> $GITHUB_OUTPUT
          else
            echo "api=🔄 Building" >> $GITHUB_OUTPUT
            echo "api-preview=" >> $GITHUB_OUTPUT
          fi
          
          # Database status
          if [ "${{ needs.deploy.outputs.database-status }}" = "success" ]; then
            echo "database=✅ Ready" >> $GITHUB_OUTPUT
            echo "database-preview=[View Console](https://console.neon.tech/app/projects/${{ env.NEON_PROJECT_ID }}/branches/${{ needs.deploy.outputs.branch-id }})" >> $GITHUB_OUTPUT
          elif [ "${{ needs.deploy.outputs.database-status }}" = "failure" ]; then
            echo "database=❌ Failed" >> $GITHUB_OUTPUT
            echo "database-preview=" >> $GITHUB_OUTPUT
          else
            echo "database=🔄 Building" >> $GITHUB_OUTPUT
            echo "database-preview=" >> $GITHUB_OUTPUT
          fi

      - name: Comment on Pull Request
        uses: thollander/actions-comment-pull-request@v2
        with:
          message: |
            The latest updates on your project deployments. [Learn more about GitHub Actions ↗︎](https://docs.github.com/en/actions)

            | Name | Status | Preview | Updated (UTC) |
            |------|--------|---------|---------------|
            | web | ${{ steps.statuses.outputs.web }} ([Inspect](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})) | ${{ steps.statuses.outputs.web-preview }} | ${{ steps.timestamp.outputs.current }} |
            | admin | ${{ steps.statuses.outputs.admin }} ([Inspect](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})) | ${{ steps.statuses.outputs.admin-preview }} | ${{ steps.timestamp.outputs.current }} |
            | plugin | ${{ steps.statuses.outputs.plugin }} ([Inspect](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})) | ${{ steps.statuses.outputs.plugin-preview }} | ${{ steps.timestamp.outputs.current }} |
            | api | ${{ steps.statuses.outputs.api }} ([Inspect](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})) | ${{ steps.statuses.outputs.api-preview }} | ${{ steps.timestamp.outputs.current }} |
            | database | ${{ steps.statuses.outputs.database }} ([Inspect](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})) | ${{ steps.statuses.outputs.database-preview }} | ${{ steps.timestamp.outputs.current }} |
          comment_tag: preview-deployment
