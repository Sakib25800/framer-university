name: Preview

on:
  pull_request:
    types: [opened, synchronize]

env:
  PNPM_VERSION: 10.11.0
  TURBO_API: ${{ vars.TURBO_API }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
  NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
  CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
  CHROMATIC_APP_ID: ${{ vars.CHROMATIC_APP_ID }}
  FLY_ORG: ${{ vars.FLY_ORG }}
  API_URL: http://localhost:8080

jobs:
  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete Neon Branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch: preview/pr-${{ github.event.number }}
          api_key: ${{ env.NEON_API_KEY }}
        continue-on-error: true

      - name: Delete Fly Apps
        uses: superfly/fly-pr-review-apps@1.2.0
        if: github.event.action == 'closed'
        with:
          token: ${{ env.FLY_API_TOKEN }}
          environment: preview
        continue-on-error: true

  ci:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://postgres:password@localhost:5432/test
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    environment:
      name: preview
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.85.0
          components: clippy, rustfmt
          cache-workspaces: apps/api

      - name: Get branch name
        id: branch-name
        uses: tj-actions/branch-names@v8

      - name: Create Neon Branch
        id: create-branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.number }}
          role: neondb_owner
          api_key: ${{ env.NEON_API_KEY }}

      - run: pnpm install

      - name: Install SQLX CLI
        run: |
          if ! command -v sqlx &> /dev/null; then
            cargo install sqlx-cli@0.7.4 --locked --no-default-features --features native-tls,postgres
          fi

      - name: SQLX setup
        working-directory: apps/api
        run: |
          cargo sqlx database create && sqlx migrate run
          pnpm generate-sqlx

      - run: pnpm build
      - run: pnpm check-types
      - run: pnpm lint
      - run: pnpm test

      - run: pnpm playwright install chromium
        working-directory: apps/web
        env:
          DATABASE_URL: ${{ steps.create-branch.outputs.connection_uri }}

      - run: pnpm test:e2e

  setup:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      branch-id: ${{ steps.create-branch.outputs.branch_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Neon Branch
        id: create-branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.number }}
          role: neondb_owner
          api_key: ${{ env.NEON_API_KEY }}

  deploy-web:
    needs: [ci, setup]
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    environment:
      name: Preview - Web
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
      status: ${{ steps.deploy.outputs.status }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - run: pnpm install
      - run: pnpm build

      - name: Deploy web to Cloudflare
        id: deploy
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          workingDirectory: "apps/web"
          command: deploy

  deploy-admin:
    needs: [ci, setup]
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    environment:
      name: Preview - Admin
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
      status: ${{ steps.deploy.outputs.status }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - run: pnpm install
      - run: pnpm build

      - name: Deploy admin to Cloudflare
        id: deploy
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          workingDirectory: "apps/admin"
          command: deploy

  deploy-plugin:
    needs: [ci, setup]
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    environment:
      name: Preview - Plugin
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
      status: ${{ steps.deploy.outputs.status }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - run: pnpm install
      - run: pnpm build

      - name: Deploy plugin to Cloudflare
        id: deploy
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          workingDirectory: "apps/plugin"
          command: deploy

  deploy-storybook:
    needs: [ci, setup]
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.deploy.outputs.status }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - run: pnpm install
      - run: pnpm build

      - name: Deploy Storybook to Chromatic
        id: deploy
        uses: chromaui/action@latest
        continue-on-error: true
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: apps/storybook

  deploy-api:
    needs: [ci, setup]
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    environment:
      name: Preview - API
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
      status: ${{ steps.deploy.outputs.status }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.85.0
          components: clippy, rustfmt
          cache-workspaces: apps/api

      - run: pnpm install

      - name: Install SQLX CLI
        run: |
          if ! command -v sqlx &> /dev/null; then
            cargo install sqlx-cli@0.7.4 --locked --no-default-features --features native-tls,postgres
          fi

      - name: Create Neon Branch
        id: create-branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.number }}
          role: neondb_owner
          api_key: ${{ env.NEON_API_KEY }}

      - name: SQLX setup
        working-directory: apps/api
        env:
          DATABASE_URL: ${{ steps.create-branch.outputs.connection_uri }}
        run: |
          cargo sqlx database create && sqlx migrate run
          pnpm generate-sqlx

      - run: pnpm build
        env:
          DATABASE_URL: ${{ steps.create-branch.outputs.connection_uri }}

      - run: pnpm test
        env:
          DATABASE_URL: ${{ steps.create-branch.outputs.connection_uri }}

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy API to Fly
        id: deploy
        uses: superfly/fly-pr-review-apps@1.2.0
        continue-on-error: true
        with:
          name: framer-university-api-pr-${{ github.event.number }}
          secrets: DATABASE_URL=${{ steps.create-branch.outputs.connection_uri }}
          postgres: false
          path: apps/api
          region: bos
          org: ${{ env.FLY_ORG }}
          build_args: |
            DATABASE_URL=${{ steps.create-branch.outputs.connection_uri }}
          config: apps/api/fly.toml

  comment:
    needs: [deploy-web, deploy-admin, deploy-plugin, deploy-storybook, deploy-api, setup]
    if: always() && github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Get PR number
        id: pr-number
        run: echo "number=${{ github.event.number }}" >> $GITHUB_OUTPUT

      - name: Create comment body
        id: comment-body
        run: |
          cat << 'EOF' >> comment.md
          ## 🚀 Preview Deployment Summary

          | Service | Status | URL |
          |---------|--------|-----|
          | Web | ${{ needs.deploy-web.outputs.status || 'Failed' }} | ${{ needs.deploy-web.outputs.url || 'N/A' }} |
          | Admin | ${{ needs.deploy-admin.outputs.status || 'Failed' }} | ${{ needs.deploy-admin.outputs.url || 'N/A' }} |
          | Plugin | ${{ needs.deploy-plugin.outputs.status || 'Failed' }} | ${{ needs.deploy-plugin.outputs.url || 'N/A' }} |
          | API | ${{ needs.deploy-api.outputs.status || 'Failed' }} | ${{ needs.deploy-api.outputs.url || 'N/A' }} |
          | Storybook | ${{ needs.deploy-storybook.outputs.status || 'Failed' }} | [View on Chromatic](https://www.chromatic.com/builds?appId=${{ env.CHROMATIC_APP_ID }}) |

          **Database Branch**: `preview/pr-${{ steps.pr-number.outputs.number }}`
          **Branch ID**: `${{ needs.setup.outputs.branch-id }}`

          ---
          *This comment will be updated automatically when the PR is updated.*
          EOF

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const commentBody = fs.readFileSync('comment.md', 'utf8');

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.find(comment => 
              comment.body.includes('Preview Deployment Summary')
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            }