name: Preview

on:
  pull_request:
    types: [opened, synchronize]

env:
  PNPM_VERSION: 10.11.0
  TURBO_API: ${{ vars.TURBO_API }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
  NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
  CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
  CHROMATIC_APP_ID: ${{ vars.CHROMATIC_APP_ID }}
  FLY_ORG: ${{ vars.FLY_ORG }}
  API_URL: http://localhost:8080

jobs:
  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete Neon Branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch: preview/pr-${{ github.event.number }}
          api_key: ${{ env.NEON_API_KEY }}
        continue-on-error: true

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Delete Fly Apps
        continue-on-error: true
        run: |
          if flyctl status --app framer-university-api-pr-${{ github.event.number }} >/dev/null 2>&1; then
            flyctl apps destroy framer-university-api-pr-${{ github.event.number }} --yes
          fi
        env:
          FLY_API_TOKEN: ${{ env.FLY_API_TOKEN }}

  ci:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://postgres:password@localhost:5432/test
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    environment:
      name: preview
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.85.0
          components: clippy, rustfmt
          cache-workspaces: apps/api

      - name: Get branch name
        id: branch-name
        uses: tj-actions/branch-names@v8

      - name: Create Neon Branch
        id: create-branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ steps.branch-name.outputs.current_branch }}
          role: neondb_owner
          api_key: ${{ env.NEON_API_KEY }}

      - run: pnpm install

      - name: Install SQLX CLI
        run: |
          if ! command -v sqlx &> /dev/null; then
            cargo install sqlx-cli@0.7.4 --locked --no-default-features --features native-tls,postgres
          fi

      - name: SQLX setup
        working-directory: apps/api
        env:
          DATABASE_URL: ${{ steps.create-branch.outputs.db_url }}
        run: |
          echo "Database URL: ${DATABASE_URL}"
          cargo sqlx database create && sqlx migrate run
          pnpm generate-sqlx

      - run: pnpm build
      - run: pnpm check-types
      - run: pnpm lint
      - run: pnpm test

      - run: pnpm playwright install chromium
        working-directory: apps/web

      - run: pnpm test:e2e
        env:
          DATABASE_URL: ${{ steps.create-branch.outputs.db_url }}

      - name: Upload API binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-binary-${{ github.run_id }}
          path: |
            apps/api/target/release/api
            apps/api/.sqlx/
          retention-days: 1

  setup:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      branch-id: ${{ steps.create-branch.outputs.branch_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Neon Branch
        id: create-branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.number }}
          role: neondb_owner
          api_key: ${{ env.NEON_API_KEY }}

  deploy:
    needs: [ci, setup]
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    environment:
      name: pr-${{ github.event.number }}
    outputs:
      web_url: ${{ steps.web-url.outputs.url }}
      admin_url: ${{ steps.admin-deploy.outputs.deployment-url }}
      plugin_url: ${{ steps.plugin-deploy.outputs.deployment-url }}
      api_url: ${{ steps.api-deploy.outputs.url }}
      web_status: ${{ steps.web-deploy.outcome }}
      admin_status: ${{ steps.admin-deploy.outcome }}
      plugin_status: ${{ steps.plugin-deploy.outcome }}
      api_status: ${{ steps.api-deploy.outcome }}
      storybook_status: ${{ steps.storybook-deploy.outcome }}
      web_changed: ${{ steps.changed-files.outputs.web_any_changed }}
      admin_changed: ${{ steps.changed-files.outputs.admin_any_changed }}
      plugin_changed: ${{ steps.changed-files.outputs.plugin_any_changed }}
      api_changed: ${{ steps.changed-files.outputs.api_any_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.85.0
          components: clippy, rustfmt
          cache-workspaces: apps/api

      - run: pnpm install

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Download API binary artifact
        uses: actions/download-artifact@v4
        with:
          name: api-binary-${{ github.run_id }}
          path: apps/api/

      - name: Get branch name
        id: branch-name
        uses: tj-actions/branch-names@v8

      - name: Create Neon Branch
        id: create-branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ steps.branch-name.outputs.current_branch }}
          role: neondb_owner
          api_key: ${{ env.NEON_API_KEY }}

      # Detect changed files to skip unnecessary deployments
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v45
        with:
          files_yaml: |
            web:
              - 'apps/web/**'
              - 'packages/**'
            admin:
              - 'apps/admin/**'
              - 'packages/**'
            plugin:
              - 'apps/plugin/**'
              - 'packages/**'
            storybook:
              - 'apps/storybook/**'
              - 'packages/**'
            api:
              - 'apps/api/**'

      # Build only changed applications
      - name: Build changed applications
        run: |
          FILTERS=""
          if [[ "${{ steps.changed-files.outputs.web_any_changed }}" == "true" ]]; then
            FILTERS="$FILTERS --filter=web"
            echo "Will build web"
          fi
          if [[ "${{ steps.changed-files.outputs.admin_any_changed }}" == "true" ]]; then
            FILTERS="$FILTERS --filter=admin"
            echo "Will build admin"
          fi
          if [[ "${{ steps.changed-files.outputs.plugin_any_changed }}" == "true" ]]; then
            FILTERS="$FILTERS --filter=plugin"
            echo "Will build plugin"
          fi
          if [[ "${{ steps.changed-files.outputs.storybook_any_changed }}" == "true" ]]; then
            FILTERS="$FILTERS --filter=storybook"
            echo "Will build storybook"
          fi

          if [ -n "$FILTERS" ]; then
            echo "Building with filters:$FILTERS"
            pnpm build$FILTERS
          else
            echo "No applications need building"
          fi

      - name: Create web preview version
        id: web-deploy
        if: steps.changed-files.outputs.web_any_changed == 'true'
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: versions upload

      - name: Extract web preview URL
        id: web-url
        if: steps.changed-files.outputs.web_any_changed == 'true'
        run: |
          # Extract Worker Version ID from command output
          VERSION_ID=$(echo '${{ steps.web-deploy.outputs.command-output }}' | grep -o 'Worker Version ID: [a-f0-9-]*' | cut -d' ' -f4)
          if [ -n "$VERSION_ID" ]; then
            WEB_URL="https://${VERSION_ID}-web.frameruniversity.workers.dev"
            echo "url=$WEB_URL" >> $GITHUB_OUTPUT
            echo "Web preview URL: $WEB_URL"
          else
            echo "url=" >> $GITHUB_OUTPUT
            echo "Could not extract version ID for web worker"
          fi

      - name: Create admin preview version
        id: admin-deploy
        if: steps.changed-files.outputs.admin_any_changed == 'true'
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/admin
          command: versions upload

      - name: Create plugin preview version
        id: plugin-deploy
        if: steps.changed-files.outputs.plugin_any_changed == 'true'
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/plugin
          command: versions upload

      - name: Deploy Storybook to Chromatic
        id: storybook-deploy
        if: steps.changed-files.outputs.storybook_any_changed == 'true'
        uses: chromaui/action@latest
        continue-on-error: true
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: apps/storybook

      - name: Deploy API to Fly
        id: api-deploy
        if: steps.changed-files.outputs.api_any_changed == 'true'
        working-directory: apps/api
        continue-on-error: true
        run: |
          # Set the app name
          APP_NAME="framer-university-api-pr-${{ github.event.number }}"

          # Make the binary executable
          chmod +x target/release/api

          # Check if app exists, create if not
          if ! flyctl status --app $APP_NAME >/dev/null 2>&1; then
            flyctl apps create $APP_NAME --org framer-university-217 --yes
          fi

          # Set secrets
          flyctl secrets set --app $APP_NAME \
            DATABASE_URL="${{ steps.create-branch.outputs.db_url }}" \
            JWT_SECRET="$(openssl rand -base64 32)" \
            MAILGUN_SMTP_PASSWORD="${{ secrets.MAILGUN_SMTP_PASSWORD }}"

          # Deploy the app using prebuilt Dockerfile
          flyctl deploy --app $APP_NAME --strategy immediate --dockerfile Dockerfile.prebuilt

          # Get the URL and set output
          URL="https://${APP_NAME}.fly.dev"
          echo "url=$URL" >> $GITHUB_OUTPUT
        env:
          FLY_API_TOKEN: ${{ env.FLY_API_TOKEN }}

  comment:
    needs: [deploy, setup]
    if: always() && github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Get PR number
        id: pr-number
        run: echo "number=${{ github.event.number }}" >> $GITHUB_OUTPUT

      - name: Generate deployment status
        id: status
        run: |
          # Generate status for each deployment
          web_status="${{ needs.deploy.outputs.web_status }}"
          admin_status="${{ needs.deploy.outputs.admin_status }}"
          plugin_status="${{ needs.deploy.outputs.plugin_status }}"
          api_status="${{ needs.deploy.outputs.api_status }}"
          storybook_status="${{ needs.deploy.outputs.storybook_status }}"

          # Convert status to emoji and text
          get_status_display() {
            case "$1" in
              "success") echo "✅ Ready" ;;
              "failure") echo "❌ Failed" ;;
              "cancelled") echo "⚠️ Cancelled" ;;
              "skipped") echo "⏭️ Skipped" ;;
              *) echo "🔄 Building" ;;
            esac
          }

          # Generate preview links for successful deployments
          get_preview_link() {
            local status="$1"
            local url="$2"
            local changed="$3"
            if [[ "$changed" == "false" ]]; then
              echo "⏭️ No changes"
            elif [[ "$status" == "success" && -n "$url" ]]; then
              echo "[Visit Preview]($url)"
            else
              echo "-"
            fi
          }

          # Generate inspect links
          get_inspect_link() {
            local name="$1"
            case "$name" in
              "web"|"admin"|"plugin") echo "[Inspect](https://dash.cloudflare.com/${{ env.CLOUDFLARE_ACCOUNT_ID }}/workers/services/view/$name/production/logs/live)" ;;
              "api") echo "[Inspect](https://fly.io/apps/framer-university-api-pr-${{ github.event.number }}/monitoring)" ;;
              "storybook") echo "[Inspect](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" ;;
              *) echo "-" ;;
            esac
          }

          echo "web_status=$(get_status_display "$web_status")" >> $GITHUB_OUTPUT
          echo "admin_status=$(get_status_display "$admin_status")" >> $GITHUB_OUTPUT
          echo "plugin_status=$(get_status_display "$plugin_status")" >> $GITHUB_OUTPUT
          echo "api_status=$(get_status_display "$api_status")" >> $GITHUB_OUTPUT
          echo "storybook_status=$(get_status_display "$storybook_status")" >> $GITHUB_OUTPUT

          echo "web_name=**Web** ($(get_inspect_link "web"))" >> $GITHUB_OUTPUT
          echo "admin_name=**Admin** ($(get_inspect_link "admin"))" >> $GITHUB_OUTPUT
          echo "plugin_name=**Plugin** ($(get_inspect_link "plugin"))" >> $GITHUB_OUTPUT
          echo "api_name=**API** ($(get_inspect_link "api"))" >> $GITHUB_OUTPUT
          echo "storybook_name=**Storybook** ($(get_inspect_link "storybook"))" >> $GITHUB_OUTPUT

          # Check if each app was changed and deployed
          web_changed="${{ needs.deploy.outputs.web_changed || 'false' }}"
          admin_changed="${{ needs.deploy.outputs.admin_changed || 'false' }}"
          plugin_changed="${{ needs.deploy.outputs.plugin_changed || 'false' }}"
          api_changed="${{ needs.deploy.outputs.api_changed || 'false' }}"

          echo "web_preview=$(get_preview_link "$web_status" "${{ needs.deploy.outputs.web_url }}" "$web_changed")" >> $GITHUB_OUTPUT
          echo "admin_preview=$(get_preview_link "$admin_status" "${{ needs.deploy.outputs.admin_url }}" "$admin_changed")" >> $GITHUB_OUTPUT
          echo "plugin_preview=$(get_preview_link "$plugin_status" "${{ needs.deploy.outputs.plugin_url }}" "$plugin_changed")" >> $GITHUB_OUTPUT
          echo "api_preview=$(get_preview_link "$api_status" "${{ needs.deploy.outputs.api_url }}" "$api_changed")" >> $GITHUB_OUTPUT
          echo "storybook_preview=[View on Chromatic](https://www.chromatic.com/builds?appId=${{ env.CHROMATIC_APP_ID }})" >> $GITHUB_OUTPUT
          echo "database_preview=[View Database](https://console.neon.tech/app/projects/${{ env.NEON_PROJECT_ID }}/branches/${{ needs.setup.outputs.branch-id }})" >> $GITHUB_OUTPUT

          # Get current timestamp for Updated column
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "current_timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT

      - name: Comment on Pull Request
        uses: thollander/actions-comment-pull-request@v2
        with:
          message: |
            Preview the latest changes from this pull request. ([View Workflow](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}))

            | Name | Status | Preview | Updated (UTC) |
            |------|--------|---------|---------------|
            | ${{ steps.status.outputs.web_name }} | ${{ steps.status.outputs.web_status }} | ${{ steps.status.outputs.web_preview }} | ${{ steps.status.outputs.current_timestamp }} |
            | ${{ steps.status.outputs.admin_name }} | ${{ steps.status.outputs.admin_status }} | ${{ steps.status.outputs.admin_preview }} | ${{ steps.status.outputs.current_timestamp }} |
            | ${{ steps.status.outputs.plugin_name }} | ${{ steps.status.outputs.plugin_status }} | ${{ steps.status.outputs.plugin_preview }} | ${{ steps.status.outputs.current_timestamp }} |
            | ${{ steps.status.outputs.api_name }} | ${{ steps.status.outputs.api_status }} | ${{ steps.status.outputs.api_preview }} | ${{ steps.status.outputs.current_timestamp }} |
            | ${{ steps.status.outputs.storybook_name }} | ${{ steps.status.outputs.storybook_status }} | ${{ steps.status.outputs.storybook_preview }} | ${{ steps.status.outputs.current_timestamp }} |
            | **Database** | ✅ Ready | ${{ steps.status.outputs.database_preview }} | ${{ steps.status.outputs.current_timestamp }} |
          comment_tag: preview-deployment
