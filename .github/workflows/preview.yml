name: Preview

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

env:
  PNPM_VERSION: 10.11.0
  TURBO_API: ${{ vars.TURBO_API }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
  NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}

jobs:
  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete Neon Branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch: preview/pr-${{ github.event.number }}
          api_key: ${{ env.NEON_API_KEY }}
        continue-on-error: true

      - name: Clean up GitHub environment
        uses: strumwolf/delete-deployment-environment@v2
        if: ${{ github.event.action == 'closed' }}
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          environment: pr-${{ github.event.number }}
        continue-on-error: true

  ci:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://postgres:password@localhost:5432/test
    concurrency:
      group: pr-${{ github.event.number }}
      cancel-in-progress: true
    environment:
      name: pr-${{ github.event.number }}
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.85.0
          components: clippy, rustfmt
          cache-workspaces: apps/api

      - name: Get branch name
        id: branch-name
        uses: tj-actions/branch-names@v8

      - name: Create Neon Branch
        id: create-branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.number }}
          role: neondb_owner
          api_key: ${{ env.NEON_API_KEY }}

      - run: pnpm install

      - name: Cache SQLX CLI
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/sqlx
          key: sqlx-cli-0.7.4

      - name: Install SQLX CLI
        run: |
          if ! command -v sqlx &> /dev/null; then
            cargo install sqlx-cli@0.7.4 --locked --no-default-features --features native-tls,postgres
          fi

      - name: Cache SQLX metadata
        uses: actions/cache@v4
        with:
          path: apps/api/.sqlx
          key: sqlx-${{ hashFiles('apps/api/migrations/**/*.sql') }}

      - name: SQLX setup
        working-directory: apps/api
        run: |
          cargo sqlx database create && sqlx migrate run
          pnpm generate-sqlx

      - run: pnpm build

      - run: pnpm check-types
      - run: pnpm lint

      - run: pnpm test

      - run: pnpm playwright install chromium
        working-directory: apps/web

      - env:
          DATABASE_URL: ${{ steps.create-branch.outputs.db_url }}
        run: pnpm test:e2e

  setup:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      branch-id: ${{ steps.create-branch.outputs.branch_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Neon Branch
        id: create-branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.number }}
          role: neondb_owner
          api_key: ${{ env.NEON_API_KEY }}

  deploy-web:
    needs: [ci, setup]
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    environment:
      name: pr-${{ github.event.number }}-web
      url: ${{ steps.deploy-web.outputs.deployment-url }}
    outputs:
      url: ${{ steps.deploy-web.outputs.deployment-url }}
      status: ${{ steps.deploy-web.outcome }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - run: pnpm install
      - run: pnpm build

      - name: Deploy web to Cloudflare
        id: deploy-web
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: "apps/web"
          command: deploy --name=web-preview-pr-${{ github.event.number }}

  deploy-admin:
    needs: [ci, setup]
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    environment:
      name: pr-${{ github.event.number }}-admin
      url: ${{ steps.deploy-admin.outputs.deployment-url }}
    outputs:
      url: ${{ steps.deploy-admin.outputs.deployment-url }}
      status: ${{ steps.deploy-admin.outcome }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - run: pnpm install
      - run: pnpm build

      - name: Deploy admin to Cloudflare
        id: deploy-admin
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: "apps/admin"
          command: deploy --name=admin-preview-pr-${{ github.event.number }}

  deploy-plugin:
    needs: [ci, setup]
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    environment:
      name: pr-${{ github.event.number }}-plugin
      url: ${{ steps.deploy-plugin.outputs.deployment-url }}
    outputs:
      url: ${{ steps.deploy-plugin.outputs.deployment-url }}
      status: ${{ steps.deploy-plugin.outcome }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - run: pnpm install
      - run: pnpm build

      - name: Deploy plugin to Cloudflare
        id: deploy-plugin
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: "apps/plugin"
          command: deploy --name=plugin-preview-pr-${{ github.event.number }}

  deploy-storybook:
    needs: [ci, setup]
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.deploy-storybook.outcome }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - run: pnpm install
      - run: pnpm build

      - name: Deploy Storybook to Chromatic
        id: deploy-storybook
        uses: chromaui/action@latest
        continue-on-error: true
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: apps/storybook


  deploy-api:
    needs: [ci, setup]
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    environment:
      name: pr-${{ github.event.number }}-api
      url: ${{ steps.deploy-api.outputs.url }}
    outputs:
      url: ${{ steps.deploy-api.outputs.url }}
      status: ${{ steps.deploy-api.outcome }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.85.0
          components: clippy, rustfmt
          cache-workspaces: apps/api

      - run: pnpm install

      - name: Cache SQLX CLI
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/sqlx
          key: sqlx-cli-0.7.4

      - name: Install SQLX CLI
        run: |
          if ! command -v sqlx &> /dev/null; then
            cargo install sqlx-cli@0.7.4 --locked --no-default-features --features native-tls,postgres
          fi

      - name: Create Neon Branch for API
        id: create-branch-api
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.number }}
          role: neondb_owner
          api_key: ${{ env.NEON_API_KEY }}

      - name: SQLX setup for deployment
        working-directory: apps/api
        env:
          DATABASE_URL: ${{ steps.create-branch-api.outputs.db_url }}
        run: sqlx migrate run

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-deps-${{ hashFiles('**/Cargo.lock') }}

      - run: pnpm install
      
      - env:
          DATABASE_URL: ${{ steps.create-branch-api.outputs.db_url }}
        run: pnpm build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Deploy API to Fly
        id: deploy-api
        uses: superfly/fly-pr-review-apps@1.5.0
        continue-on-error: true
        with:
          name: pr-${{ github.event.number }}-frameruniversity-api
          secrets: DATABASE_URL=${{ steps.create-branch-api.outputs.db_url }}
          postgres: false
          path: apps/api
          region: lhr
          org: framer-university
          build_args: BUILDKIT_INLINE_CACHE=1
          config: Dockerfile.prebuilt

  comment:
    needs: [deploy-web, deploy-admin, deploy-plugin, deploy-storybook, deploy-api, setup]
    if: always() && github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Get current timestamp
        id: timestamp
        run: echo "current=$(date -u +'%b %d, %Y %I:%M%p')" >> $GITHUB_OUTPUT

      - name: Set deployment statuses
        id: statuses
        run: |
          # Web status
          if [ "${{ needs.deploy-web.result }}" = "success" ]; then
            echo "web=✅ Ready" >> $GITHUB_OUTPUT
            echo "web-preview=[Visit Preview](${{ needs.deploy-web.outputs.url }})" >> $GITHUB_OUTPUT
          elif [ "${{ needs.deploy-web.result }}" = "failure" ]; then
            echo "web=❌ Failed" >> $GITHUB_OUTPUT
            echo "web-preview=" >> $GITHUB_OUTPUT
          else
            echo "web=🔄 Building" >> $GITHUB_OUTPUT
            echo "web-preview=" >> $GITHUB_OUTPUT
          fi
          
          # Admin status
          if [ "${{ needs.deploy-admin.result }}" = "success" ]; then
            echo "admin=✅ Ready" >> $GITHUB_OUTPUT
            echo "admin-preview=[Visit Preview](${{ needs.deploy-admin.outputs.url }})" >> $GITHUB_OUTPUT
          elif [ "${{ needs.deploy-admin.result }}" = "failure" ]; then
            echo "admin=❌ Failed" >> $GITHUB_OUTPUT
            echo "admin-preview=" >> $GITHUB_OUTPUT
          else
            echo "admin=🔄 Building" >> $GITHUB_OUTPUT
            echo "admin-preview=" >> $GITHUB_OUTPUT
          fi
          
          # Plugin status
          if [ "${{ needs.deploy-plugin.result }}" = "success" ]; then
            echo "plugin=✅ Ready" >> $GITHUB_OUTPUT
            echo "plugin-preview=[Visit Preview](${{ needs.deploy-plugin.outputs.url }})" >> $GITHUB_OUTPUT
          elif [ "${{ needs.deploy-plugin.result }}" = "failure" ]; then
            echo "plugin=❌ Failed" >> $GITHUB_OUTPUT
            echo "plugin-preview=" >> $GITHUB_OUTPUT
          else
            echo "plugin=🔄 Building" >> $GITHUB_OUTPUT
            echo "plugin-preview=" >> $GITHUB_OUTPUT
          fi
          
          # API status
          if [ "${{ needs.deploy-api.result }}" = "success" ]; then
            echo "api=✅ Ready" >> $GITHUB_OUTPUT
            echo "api-preview=[Visit Preview](${{ needs.deploy-api.outputs.url }})" >> $GITHUB_OUTPUT
          elif [ "${{ needs.deploy-api.result }}" = "failure" ]; then
            echo "api=❌ Failed" >> $GITHUB_OUTPUT
            echo "api-preview=" >> $GITHUB_OUTPUT
          else
            echo "api=🔄 Building" >> $GITHUB_OUTPUT
            echo "api-preview=" >> $GITHUB_OUTPUT
          fi
          
          # Storybook status
          if [ "${{ needs.deploy-storybook.result }}" = "success" ]; then
            echo "storybook=✅ Ready" >> $GITHUB_OUTPUT
            echo "storybook-preview=[View Builds](https://www.chromatic.com/builds?appId=682b64d98cd11e69605e4eae)" >> $GITHUB_OUTPUT
          elif [ "${{ needs.deploy-storybook.result }}" = "failure" ]; then
            echo "storybook=❌ Failed" >> $GITHUB_OUTPUT
            echo "storybook-preview=" >> $GITHUB_OUTPUT
          else
            echo "storybook=🔄 Building" >> $GITHUB_OUTPUT
            echo "storybook-preview=" >> $GITHUB_OUTPUT
          fi
          
          # Database status (always success since it's just setup)
          echo "database=✅ Ready" >> $GITHUB_OUTPUT
          echo "database-preview=[View Console](https://console.neon.tech/app/projects/${{ env.NEON_PROJECT_ID }}/branches)" >> $GITHUB_OUTPUT

      - name: Comment on Pull Request
        uses: thollander/actions-comment-pull-request@v2
        with:
          message: |
            The latest updates on your projects ([inspect](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})).

            | Name | Status | Preview | Updated (UTC) |
            |------|--------|---------|---------------|
            | web | ${{ steps.statuses.outputs.web }} ([Inspect](https://dash.cloudflare.com/d47aab7d55d6a29134f932b532a830dd/workers/services/view/web-preview-pr-${{ github.event.number }}/production/observability/logs)) | ${{ steps.statuses.outputs.web-preview }} | ${{ steps.timestamp.outputs.current }} |
            | admin | ${{ steps.statuses.outputs.admin }} ([Inspect](https://dash.cloudflare.com/d47aab7d55d6a29134f932b532a830dd/workers/services/view/admin-preview-pr-${{ github.event.number }}/production/observability/logs)) | ${{ steps.statuses.outputs.admin-preview }} | ${{ steps.timestamp.outputs.current }} |
            | plugin | ${{ steps.statuses.outputs.plugin }} ([Inspect](https://dash.cloudflare.com/d47aab7d55d6a29134f932b532a830dd/workers/services/view/plugin-preview-pr-${{ github.event.number }}/production/observability/logs)) | ${{ steps.statuses.outputs.plugin-preview }} | ${{ steps.timestamp.outputs.current }} |
            | api | ${{ steps.statuses.outputs.api }} ([Inspect](https://fly.io/apps/pr-${{ github.event.number }}-frameruniversity-api/monitoring)) | ${{ steps.statuses.outputs.api-preview }} | ${{ steps.timestamp.outputs.current }} |
            | storybook | ${{ steps.statuses.outputs.storybook }} ([Inspect](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})) | ${{ steps.statuses.outputs.storybook-preview }} | ${{ steps.timestamp.outputs.current }} |
            | database | ${{ steps.statuses.outputs.database }} ([Inspect](https://console.neon.tech/app/projects/${{ env.NEON_PROJECT_ID }}/branches)) | ${{ steps.statuses.outputs.database-preview }} | ${{ steps.timestamp.outputs.current }} |
          comment_tag: preview-deployment
