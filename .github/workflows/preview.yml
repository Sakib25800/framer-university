name: Preview

on:
  pull_request:
    types: [opened, synchronize, closed]

env:
  PNPM_VERSION: 10.11.0
  TURBO_API: ${{ vars.TURBO_API }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
  NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
  CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
  CHROMATIC_APP_ID: ${{ vars.CHROMATIC_APP_ID }}
  FLY_ORG: ${{ vars.FLY_ORG }}
  API_URL: http://localhost:8080

jobs:
  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - uses: actions/checkout@v4

      - run: pnpm install

      - name: Delete Neon Branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch: preview/pr-${{ github.event.number }}
          api_key: ${{ env.NEON_API_KEY }}
        continue-on-error: true

      - name: Delete Cloudflare Workers and Resources
        continue-on-error: true
        working-directory: apps/web
        run: |
          # Delete the worker
          pnpm wrangler delete --name web-pr-${{ github.event.number }} --force || true

          # Delete R2 bucket (note: bucket must be empty first)
          pnpm wrangler r2 object delete web-cache-pr-${{ github.event.number }} --recursive || true
          pnpm wrangler r2 bucket delete web-cache-pr-${{ github.event.number }} || true

          # Delete D1 database
          D1_ID=$(pnpm wrangler d1 list --output json | jq -r '.[] | select(.name=="web-tag-cache-pr-${{ github.event.number }}") | .database_id')
          if [ -n "$D1_ID" ]; then
            pnpm wrangler d1 delete "$D1_ID" --force || true
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ env.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}

      - name: Delete GitHub Environment
        continue-on-error: true
        run: |
          curl -X DELETE \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/environments/pr-${{ github.event.number }}"

  ci:
    needs: [setup]
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://postgres:password@localhost:5432/test
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.85.0
          components: clippy, rustfmt
          cache-workspaces: apps/api

      - name: Get existing Neon Branch
        id: get-branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.number }}
          role: neondb_owner
          api_key: ${{ env.NEON_API_KEY }}

      - run: pnpm install

      - name: Install SQLX CLI
        run: |
          if ! command -v sqlx &> /dev/null; then
            cargo install sqlx-cli@0.7.4 --locked --no-default-features --features native-tls,postgres
          fi

      - name: SQLX check
        working-directory: apps/api
        env:
          DATABASE_URL: ${{ steps.get-branch.outputs.db_url }}
        run: |
          cargo sqlx database create && sqlx migrate run
          cargo sqlx prepare --check

      - run: pnpm build
      - run: pnpm check-types
      - run: pnpm lint
      - run: pnpm test

      - run: pnpm playwright install chromium
        working-directory: apps/web

      - run: pnpm test:e2e
        env:
          DATABASE_URL: ${{ steps.get-branch.outputs.db_url }}

      - name: Upload API binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-binary-${{ github.run_id }}
          path: |
            apps/api/target/release/api
            apps/api/.sqlx/
          retention-days: 1

  setup:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      branch-id: ${{ steps.create-branch.outputs.branch_id }}
      web_changed: ${{ steps.changed-files.outputs.web_any_changed }}
      admin_changed: ${{ steps.changed-files.outputs.admin_any_changed }}
      plugin_changed: ${{ steps.changed-files.outputs.plugin_any_changed }}
      storybook_changed: ${{ steps.changed-files.outputs.storybook_any_changed }}
      api_changed: ${{ steps.changed-files.outputs.api_any_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v45
        with:
          files_yaml: |
            web:
              - 'apps/web/**'
              - 'packages/**'
            admin:
              - 'apps/admin/**'
              - 'packages/**'
            plugin:
              - 'apps/plugin/**'
              - 'packages/**'
            storybook:
              - 'apps/storybook/**'
              - 'packages/**'
            api:
              - 'apps/api/**'

      - name: Create Neon Branch
        id: create-branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.number }}
          role: neondb_owner
          api_key: ${{ env.NEON_API_KEY }}

  deploy-web:
    needs: [ci, setup]
    if: github.event.action != 'closed' && (github.event.action == 'opened' || needs.setup.outputs.web_changed == 'true')
    runs-on: ubuntu-latest
    concurrency:
      group: pr-${{ github.event.number }}-web
    environment:
      name: pr-${{ github.event.number }}-web
      url: ${{ steps.web-deploy.outputs.deployment-url }}
    outputs:
      web_url: ${{ steps.web-deploy.outputs.deployment-url }}
      web_status: ${{ steps.web-deploy.outputs.deploy_status }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - run: pnpm install

      - run: pnpm build --filter=web

      - name: Create Cloudflare resources
        id: create-resources
        working-directory: apps/web
        run: |
          # Create R2 bucket for this PR (check if exists first)
          if ! pnpm wrangler r2 bucket list | grep -q "web-cache-pr-${{ github.event.number }}"; then
            echo "Creating R2 bucket..."
            pnpm wrangler r2 bucket create web-cache-pr-${{ github.event.number }}
          else
            echo "R2 bucket already exists"
          fi

          # Create D1 database for this PR (check if exists first)
          if ! pnpm wrangler d1 list | grep -q "web-tag-cache-pr-${{ github.event.number }}"; then
            echo "Creating D1 database..."
            pnpm wrangler d1 create web-tag-cache-pr-${{ github.event.number }}
          else
            echo "D1 database already exists"
          fi

          # Get the database ID
          echo "Getting D1 database ID..."
          D1_ID=$(pnpm wrangler d1 list | grep "web-tag-cache-pr-${{ github.event.number }}" | grep -oE '[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}')

          if [ -z "$D1_ID" ]; then
            echo "Failed to get D1 database ID"
            exit 1
          fi

          echo "D1 Database ID: $D1_ID"
          echo "d1_database_id=$D1_ID" >> $GITHUB_OUTPUT

          # Create the D1 schema using the Cloudflare API
          echo "Creating D1 schema..."
          curl -X POST "https://api.cloudflare.com/client/v4/accounts/${{ env.CLOUDFLARE_ACCOUNT_ID }}/d1/database/$D1_ID/query" \
            -H "Authorization: Bearer ${{ env.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"sql": "CREATE TABLE IF NOT EXISTS tags (tag TEXT PRIMARY KEY, paths TEXT)"}' || echo "Schema creation skipped"
        env:
          CLOUDFLARE_API_TOKEN: ${{ env.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy web to preview environment
        id: web-deploy
        working-directory: apps/web
        run: |
          # Set environment variables for substitution
          export WORKER_NAME="web-pr-${{ github.event.number }}"
          export R2_BUCKET_NAME="web-cache-pr-${{ github.event.number }}"
          export D1_DATABASE_ID="${{ steps.create-resources.outputs.d1_database_id }}"
          export D1_DATABASE_NAME="web-tag-cache-pr-${{ github.event.number }}"

          # Generate wrangler.json from template
          envsubst < wrangler.template.json > wrangler-pr.json

          # Deploy using the generated config
          set +e
          DEPLOY_OUTPUT=$(pnpm wrangler deploy --config wrangler-pr.json 2>&1)
          DEPLOY_EXIT_CODE=$?
          set -e

          echo "$DEPLOY_OUTPUT"

          # Clean up
          rm -f wrangler-pr.json

          if [ $DEPLOY_EXIT_CODE -eq 0 ]; then
            # Extract URL from output
            DEPLOYMENT_URL=$(echo "$DEPLOY_OUTPUT" | grep -o 'https://[^ ]*' | grep -E '(workers\.dev|pages\.dev)' | head -1)
            if [ -z "$DEPLOYMENT_URL" ]; then
              DEPLOYMENT_URL="https://web-pr-${{ github.event.number }}.frameruniversity.workers.dev"
            fi
            echo "deployment-url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
            echo "deploy_status=success" >> $GITHUB_OUTPUT
          else
            echo "deployment-url=" >> $GITHUB_OUTPUT
            echo "deploy_status=failure" >> $GITHUB_OUTPUT
            exit 1
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ env.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}

  deploy-admin:
    needs: [ci, setup]
    if: github.event.action != 'closed' && (github.event.action == 'opened' || needs.setup.outputs.admin_changed == 'true')
    runs-on: ubuntu-latest
    concurrency:
      group: pr-${{ github.event.number }}-admin
    environment:
      name: pr-${{ github.event.number }}-admin
      url: ${{ steps.admin-deploy.outputs.deployment-url }}
    outputs:
      admin_url: ${{ steps.admin-deploy.outputs.deployment-url }}
      admin_status: ${{ steps.admin-deploy.outcome }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - run: pnpm install

      - run: pnpm build --filter=admin

      - name: Create admin preview version
        id: admin-deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/admin
          command: versions upload

  deploy-plugin:
    needs: [ci, setup]
    if: github.event.action != 'closed' && (github.event.action == 'opened' || needs.setup.outputs.plugin_changed == 'true')
    runs-on: ubuntu-latest
    concurrency:
      group: pr-${{ github.event.number }}-plugin
    environment:
      name: pr-${{ github.event.number }}-plugin
      url: ${{ steps.plugin-deploy.outputs.deployment-url }}
    outputs:
      plugin_url: ${{ steps.plugin-deploy.outputs.deployment-url }}
      plugin_status: ${{ steps.plugin-deploy.outcome }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - run: pnpm install

      - run: pnpm build --filter=plugin

      - name: Create plugin preview version
        id: plugin-deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/plugin
          command: versions upload

  deploy-storybook:
    needs: [ci, setup]
    if: github.event.action != 'closed' && (github.event.action == 'opened' || needs.setup.outputs.storybook_changed == 'true')
    runs-on: ubuntu-latest
    concurrency:
      group: pr-${{ github.event.number }}-storybook
    environment:
      name: pr-${{ github.event.number }}-storybook
      url: ${{ steps.storybook-deploy.outputs.buildUrl }}
    outputs:
      storybook_url: ${{ steps.storybook-deploy.outputs.buildUrl }}
      storybook_status: ${{ steps.storybook-deploy.outcome }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - run: pnpm install

      - run: pnpm build --filter=storybook

      - name: Deploy Storybook to Chromatic
        id: storybook-deploy
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: apps/storybook

  deploy-api:
    needs: [ci, setup]
    if: github.event.action != 'closed' && (github.event.action == 'opened' || needs.setup.outputs.api_changed == 'true')
    runs-on: ubuntu-latest
    concurrency:
      group: pr-${{ github.event.number }}-api
    environment:
      name: pr-${{ github.event.number }}-api
      url: ${{ steps.api-deploy.outputs.url }}
    outputs:
      api_url: ${{ steps.api-deploy.outputs.url }}
      api_status: ${{ steps.api-deploy.outcome }}

    steps:
      - uses: actions/checkout@v4

      - name: Get existing Neon Branch
        id: get-branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.number }}
          role: neondb_owner
          api_key: ${{ env.NEON_API_KEY }}

      - name: Deploy API to Fly
        id: api-deploy
        uses: superfly/fly-pr-review-apps@1.5.0
        with:
          name: framer-university-api-pr-${{ github.event.number }}
          path: apps/api
          secrets: DATABASE_URL=${{ steps.get-branch.outputs.db_url }} JWT_SECRET=${{ secrets.JWT_SECRET }} MAILGUN_SMTP_PASSWORD=${{ secrets.MAILGUN_SMTP_PASSWORD }}
        env:
          FLY_API_TOKEN: ${{ env.FLY_API_TOKEN }}
          FLY_ORG: ${{ env.FLY_ORG }}

  comment:
    needs: [setup, deploy-web, deploy-admin, deploy-plugin, deploy-storybook, deploy-api]
    if: always() && github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Get PR number
        id: pr-number
        run: echo "number=${{ github.event.number }}" >> $GITHUB_OUTPUT

      - name: Generate deployment status
        id: status
        run: |
          # Get status from the deploy job outputs (using GitHub Actions conditional syntax)
          web_status="${{ needs.deploy-web.outputs.web_status }}"
          admin_status="${{ needs.deploy-admin.outputs.admin_status }}"
          plugin_status="${{ needs.deploy-plugin.outputs.plugin_status }}"
          api_status="${{ needs.deploy-api.outputs.api_status }}"
          storybook_status="${{ needs.deploy-storybook.outputs.storybook_status }}"

          # Check if any deploy job failed entirely
          web_result="${{ needs.deploy-web.result }}"
          admin_result="${{ needs.deploy-admin.result }}"
          plugin_result="${{ needs.deploy-plugin.result }}"
          api_result="${{ needs.deploy-api.result }}"
          storybook_result="${{ needs.deploy-storybook.result }}"

          # Convert status to emoji and text
          get_status_display() {
            local status="$1"
            local deploy_result="$2"

            # Handle skipped jobs (when conditions aren't met)
            if [[ "$deploy_result" == "skipped" ]]; then
              echo "⏭️ Skipped (no changes)"
            # If deploy job failed and status is empty, show failed
            elif [[ "$deploy_result" == "failure" && -z "$status" ]]; then
              echo "❌ Failed"
            elif [[ "$deploy_result" == "cancelled" && -z "$status" ]]; then
              echo "⚠️ Cancelled"
            else
              case "$status" in
                "success") echo "✅ Ready" ;;
                "failure") echo "❌ Failed" ;;
                "cancelled") echo "⚠️ Cancelled" ;;
                "skipped") echo "⏭️ Skipped" ;;
                *) echo "🔄 Building" ;;
              esac
            fi
          }

          # Generate preview links for successful deployments
          get_preview_link() {
            local status="$1"
            local url="$2"
            local deploy_result="$3"
            if [[ "$deploy_result" == "skipped" ]]; then
              echo "-"
            elif [[ "$status" == "success" && -n "$url" ]]; then
              echo "[Visit Preview]($url)"
            else
              echo "-"
            fi
          }

          # Generate inspect links
          get_inspect_link() {
            local name="$1"
            case "$name" in
              "web") echo "[Inspect](https://dash.cloudflare.com/${{ env.CLOUDFLARE_ACCOUNT_ID }}/workers/services/view/web-pr-${{ github.event.number }}/production/logs/live)" ;;
              "admin"|"plugin") echo "[Inspect](https://dash.cloudflare.com/${{ env.CLOUDFLARE_ACCOUNT_ID }}/workers/services/view/$name/production/logs/live)" ;;
              "api") echo "[Inspect](https://fly.io/apps/framer-university-api-pr-${{ github.event.number }}/monitoring)" ;;
              "storybook") echo "[Inspect](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" ;;
              *) echo "-" ;;
            esac
          }

          echo "web_status=$(get_status_display "$web_status" "$web_result")" >> $GITHUB_OUTPUT
          echo "admin_status=$(get_status_display "$admin_status" "$admin_result")" >> $GITHUB_OUTPUT
          echo "plugin_status=$(get_status_display "$plugin_status" "$plugin_result")" >> $GITHUB_OUTPUT
          echo "api_status=$(get_status_display "$api_status" "$api_result")" >> $GITHUB_OUTPUT
          echo "storybook_status=$(get_status_display "$storybook_status" "$storybook_result")" >> $GITHUB_OUTPUT

          echo "web_name=**Web** ($(get_inspect_link "web"))" >> $GITHUB_OUTPUT
          echo "admin_name=**Admin** ($(get_inspect_link "admin"))" >> $GITHUB_OUTPUT
          echo "plugin_name=**Plugin** ($(get_inspect_link "plugin"))" >> $GITHUB_OUTPUT
          echo "api_name=**API** ($(get_inspect_link "api"))" >> $GITHUB_OUTPUT
          echo "storybook_name=**Storybook** ($(get_inspect_link "storybook"))" >> $GITHUB_OUTPUT

          echo "web_preview=$(get_preview_link "$web_status" "${{ needs.deploy-web.outputs.web_url }}" "$web_result")" >> $GITHUB_OUTPUT
          echo "admin_preview=$(get_preview_link "$admin_status" "${{ needs.deploy-admin.outputs.admin_url }}" "$admin_result")" >> $GITHUB_OUTPUT
          echo "plugin_preview=$(get_preview_link "$plugin_status" "${{ needs.deploy-plugin.outputs.plugin_url }}" "$plugin_result")" >> $GITHUB_OUTPUT
          echo "api_preview=$(get_preview_link "$api_status" "${{ needs.deploy-api.outputs.api_url }}" "$api_result")" >> $GITHUB_OUTPUT
          echo "storybook_preview=$(get_preview_link "$storybook_status" "${{ needs.deploy-storybook.outputs.storybook_url }}" "$storybook_result")" >> $GITHUB_OUTPUT
          echo "database_preview=[View Database](https://console.neon.tech/app/projects/${{ env.NEON_PROJECT_ID }}/branches/${{ needs.setup.outputs.branch-id }})" >> $GITHUB_OUTPUT

          # Get current timestamp for Updated column
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "current_timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT

      - name: Comment on Pull Request
        uses: thollander/actions-comment-pull-request@v2
        with:
          message: |
            Preview the latest changes from this pull request. ([View Workflow](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}))

            | Name | Status | Preview | Updated (UTC) |
            |------|--------|---------|---------------|
            | ${{ steps.status.outputs.web_name }} | ${{ steps.status.outputs.web_status }} | ${{ steps.status.outputs.web_preview }} | ${{ steps.status.outputs.current_timestamp }} |
            | ${{ steps.status.outputs.admin_name }} | ${{ steps.status.outputs.admin_status }} | ${{ steps.status.outputs.admin_preview }} | ${{ steps.status.outputs.current_timestamp }} |
            | ${{ steps.status.outputs.plugin_name }} | ${{ steps.status.outputs.plugin_status }} | ${{ steps.status.outputs.plugin_preview }} | ${{ steps.status.outputs.current_timestamp }} |
            | ${{ steps.status.outputs.api_name }} | ${{ steps.status.outputs.api_status }} | ${{ steps.status.outputs.api_preview }} | ${{ steps.status.outputs.current_timestamp }} |
            | ${{ steps.status.outputs.storybook_name }} | ${{ steps.status.outputs.storybook_status }} | ${{ steps.status.outputs.storybook_preview }} | ${{ steps.status.outputs.current_timestamp }} |
            | **Database** | ✅ Ready | ${{ steps.status.outputs.database_preview }} | ${{ steps.status.outputs.current_timestamp }} |
          comment_tag: preview-deployment
